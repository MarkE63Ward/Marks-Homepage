<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mark's Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0f1117;--bg2:#1e2433;--bg3:#0f1117;
      --brd:#2d3748;--brd2:#3d4f63;
      --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#475569;--tx4:#64748b;
      --panel:#1e2433;--inp:#0f1117;--inp2:#1e2433;
    }
    body.light{
      --bg:#d8f7f5;--bg2:#f5f1e3;--bg3:#f7f8f8;
      --brd:#cbd5e1;--brd2:#94a3b8;
      --tx:#0f172a;--tx2:#334155;--tx3:#475569;--tx4:#64748b;
      --panel:#cad1f046;--inp:#e6f0fa;--inp2:#ffffff;
    }
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:10px;}

    /* Theme bar */
    #theme-bar {
    background: var(--bg2);
    border: 1px solid var(--brd); 
    border-radius: 12px;        
    padding: 8px 16px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 4px;
    
    margin: 20px 24px 10px;           
    width: fit-content;        
    margin-left: auto;           
}
    .th-lbl{font-size:16px;color:var(--tx3);}
    .th-wrap{position:relative;width:44px;height:24px;flex-shrink:0;}
    .th-wrap input{opacity:0;width:0;height:0;position:absolute;}
    .th-track{position:absolute;inset:0;background:#334155;border-radius:24px;cursor:pointer;transition:background .2s;}
    .th-wrap input:checked + .th-track{background:#3b82f6;}
    .th-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;pointer-events:none;transition:transform .2s;}
    .th-wrap input:checked ~ .th-thumb{transform:translateX(20px);}

    #auth-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
    #auth-gate.gone{display:none;}
    .auth-card{background:var(--panel);border:1px solid var(--brd);border-radius:18px;padding:52px 44px;width:100%;max-width:380px;text-align:center;}
    .auth-h{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px;}
    .auth-sub{font-size:13px;color:var(--tx4);margin-bottom:30px;}
    .auth-in{width:100%;padding:16px;background:var(--inp);border:1px solid var(--brd);border-radius:10px;color:var(--tx);font-size:24px;letter-spacing:10px;text-align:center;outline:none;margin-bottom:14px;transition:border-color .2s;}
    .auth-in:focus{border-color:#3b82f6;}
    .auth-btn{width:100%;padding:14px;background:#3b82f6;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
    .auth-btn:hover{background:#2563eb;}
    .auth-err{color:#ef4444;font-size:13px;margin-top:8px;min-height:18px;}

    #app{display:none;}

    nav{background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;position:sticky;top:0;z-index:100;}
    .brand{font-size:18px;font-weight:700;color:var(--tx);}
    .brand b{color:#3b82f6;}
    .brand r{color:#f63b3b;}
    .nav-r{display:flex;align-items:center;gap:10px;}
    .nav-a{padding:7px 15px;border-radius:8px;font-size:14px;color:var(--tx2);text-decoration:none;font-weight:500;}
    .nav-a:hover{background:var(--brd);color:var(--tx);}
    .sign-out{padding:7px 14px;border-radius:8px;font-size:13px;color:var(--tx4);border:1px solid var(--brd);background:transparent;cursor:pointer;}
    .sign-out:hover{border-color:#ef4444;color:#ef4444;}

    #clock-bar{display: flex; justify-content: space-around; padding:18px 24px 14px;border-bottom:1px solid var(--brd);}
    #dt{font-size:42px;font-weight:700;color:rgb(68, 95, 250);}
    #dsub{font-size:42px;font-weight:700;color:rgb(68, 95, 250);margin-top:3px;}

    #search-bar{display:flex;justify-content:center;padding:14px 24px 18px;}
    .sw{position:relative;width:100%;max-width:600px;}
    .sw svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none;}
    .si{width:100%;padding:12px 16px 12px 44px;background:var(--inp2);border:1px solid var(--brd);border-radius:12px;color:var(--tx);font-size:15px;outline:none;}
    .si:focus{border-color:#3b82f6;}

    #grid{display:grid;grid-template-columns:265px 1fr 350px;gap:16px;padding:0 16px 24px;align-items:start;}

    .panel{background:var(--panel);border:1px solid var(--brd);border-radius:16px;padding:18px;}
    .ptitle{font-size:11px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:1.2px;}

    #link-list{list-style:none;display:flex;flex-direction:column;gap:4px;max-height:420px;overflow-y:auto;margin-top:8px;}
    .li-row{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;cursor:pointer;border:1px solid transparent;font-size:14px;color:var(--tx);transition:background .12s;}
    .li-row:hover{background:var(--brd);border-color:var(--brd2);}
    .li-ebtns{display:none;gap:4px;margin-left:auto;}
    .em-on .li-ebtns{display:flex;}
    .em-on .li-row{border-style:dashed;border-color:var(--brd);}
    .lb{padding:3px 7px;border-radius:5px;font-size:10px;border:none;cursor:pointer;font-weight:700;}
    .lb-e{background:#1d4ed8;color:#fff;}
    .lb-d{background:#7f1d1d;color:#fca5a5;}
    .lb-m{background:#334155;color:#94a3b8;}
    .sm-btn{flex:1;padding:8px 0;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;}

    #cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:4px;}
    .cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:11px;cursor:pointer;color:var(--tx3);transition:background .1s;user-select:none;}
    .cd:hover{background:var(--brd);color:var(--tx);}
    .cd.inm{color:var(--tx2);} .cd.wknd{color:#f59e0b;}
    .cd.tdy{background:#1d4ed8;color:#fff!important;font-weight:700;}
    .cd.sel{background:#0ea5e9;color:#fff!important;font-weight:700;}

    #todo-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px;}
    .tc{background:var(--inp);border:1px solid var(--brd);border-left:4px solid #334155;border-radius:14px;padding:16px 18px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:8px;}
    .tc:hover{border-color:var(--brd2);transform:translateY(-2px);}
    .tc.p-Top   {border-left-color:#ef4444;} .tc.p-High  {border-left-color:#f97316;}
    .tc.p-Medium{border-left-color:#eab308;} .tc.p-Low   {border-left-color:#22c55e;}
    .tc.p-Future{border-left-color:#a855f7;} .tc.done{opacity:.4;}
    .tc-title{font-size:15px;font-weight:600;color:var(--tx);line-height:1.35;}
    .badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
    .b-Top{background:#450a0a;color:#fca5a5;} .b-High{background:#431407;color:#fdba74;}
    .b-Medium{background:#422006;color:#fde68a;} .b-Low{background:#052e16;color:#86efac;}
    .b-Future{background:#2e1065;color:#d8b4fe;}
    .tc-tags{display:flex;gap:5px;flex-wrap:wrap;}
    .ttag{font-size:10px;color:#60a5fa;background:#172554;padding:2px 8px;border-radius:20px;}
    .tc-due{font-size:10px;color:#94a3b8;font-weight:500;}
    .tc-hint{font-size:10px;color:#2d3f56;font-style:italic;margin-top:2px;}

    .fbar{display:flex;gap:8px;flex-wrap:wrap;}
    .fi{flex:1;min-width:130px;padding:9px 12px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--tx);font-size:13px;outline:none;}
    .fi:focus{border-color:#3b82f6;}
    .fs{padding:9px 10px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--tx2);font-size:13px;outline:none;cursor:pointer;}
    .tag-cloud{display:flex;gap:6px;flex-wrap:wrap;min-height:4px;}
    .tp{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--brd);background:var(--inp);color:var(--tx4);cursor:pointer;}
    .tp.on{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}

    /* Hyperlink inline modal */
    #link-popup{position:absolute;background:var(--panel);border:1px solid #3b82f6;border-radius:12px;padding:14px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:800;display:none;flex-direction:column;gap:8px;}
    #link-popup.open{display:flex;}
    #link-popup input{padding:8px 10px;background:var(--inp);border:1px solid var(--brd);border-radius:7px;color:var(--tx);font-size:13px;outline:none;width:100%;}
    #link-popup input:focus{border-color:#3b82f6;}
    #link-popup .lp-row{display:flex;gap:6px;}
    #link-popup .lp-btn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;}

    .todo-form{background:var(--inp);border:1px solid #3b82f6;border-radius:14px;padding:22px;animation:sld .2s ease-out;}
    @keyframes sld{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
    .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
    .fl{font-size:10px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.8px;}
    .fc{padding:10px 12px;background:var(--inp2);border:1px solid var(--brd);border-radius:8px;color:var(--tx);font-size:13px;outline:none;font-family:inherit;width:100%;}
    .fc:focus{border-color:#3b82f6;}
    .rich-toolbar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
    .rt-btn{padding:4px 10px;border-radius:5px;background:var(--brd);border:none;color:var(--tx2);font-size:12px;cursor:pointer;font-weight:600;}
    .rt-btn:hover{color:var(--tx);}
    .rich-ed{min-height:150px;padding:12px;background:var(--inp2);border:1px solid var(--brd);border-radius:8px;color:var(--tx);font-size:13px;outline:none;line-height:1.65;overflow-y:auto;}
    .rich-ed:focus{border-color:#3b82f6;}
    .rich-ed a{color:#60a5fa;text-decoration:underline;}
    .fbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
    .btn-c{padding:10px 22px;border-radius:8px;background:var(--inp2);border:1px solid var(--brd);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;}
    .btn-s{padding:10px 24px;border-radius:8px;background:#1d4ed8;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
    .btn-s:hover{background:#1e40af;} .btn-s:disabled{opacity:.5;cursor:not-allowed;}

    .mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
    .mbg.open{display:flex;}
    .mbox{background:var(--panel);border:1px solid var(--brd);border-radius:20px;padding:32px;width:100%;max-width:600px;position:relative;max-height:90vh;overflow-y:auto;}
    .mclose{position:absolute;top:16px;right:16px;background:var(--brd);border:none;color:var(--tx2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
    .mclose:hover{color:var(--tx);}
    .m-bar{height:4px;border-radius:4px;margin-bottom:20px;}
    .m-title{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:12px;line-height:1.3;}
    .m-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;margin-bottom:16px;font-size:13px;}
    .m-lbl{color:var(--tx4);font-weight:600;} .m-val{color:var(--tx);}
    .m-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
    .m-nlbl{font-size:11px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
    .m-notes{font-size:14px;color:var(--tx);line-height:1.75;background:var(--inp);border-radius:10px;padding:16px;border:1px solid var(--brd);min-height:60px;}
    .m-notes a{color:#60a5fa;text-decoration:underline;}
    .m-actions{display:flex;gap:10px;margin-top:22px;padding-top:20px;border-top:1px solid var(--brd);flex-wrap:wrap;}
    .m-btn{padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;border:none;cursor:pointer;flex:1;min-width:90px;}
    .m-btn:hover{opacity:.82;}

    .lmbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:700;display:none;align-items:center;justify-content:center;padding:20px;}
    .lmbg.open{display:flex;}
    .lmbox{background:var(--panel);border:1px solid #3b82f6;border-radius:18px;padding:28px;width:100%;max-width:400px;}

    .widget{background:var(--panel);border:1px solid var(--brd);border-radius:16px;padding:16px;}
    .wt{font-size:11px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}
    .map-in{width:100%;padding:9px 12px;background:var(--inp);border:1px solid var(--brd);border-radius:8px;color:var(--tx);font-size:13px;outline:none;margin-bottom:10px;}
    .map-in:focus{border-color:#3b82f6;}

    .spin{display:inline-block;width:20px;height:20px;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:sp .7s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:56px 20px;color:var(--tx4);font-size:14px;line-height:2;grid-column:1/-1;}
    .load-center{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:48px;}
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-gate">
  <div class="auth-card">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <div class="auth-h">Mark's Dashboard</div>
    <div class="auth-sub">Enter your access code to continue</div>
    <input type="password" class="auth-in" id="auth-in" placeholder="······" maxlength="10"/>
    <button class="auth-btn" id="auth-btn">Unlock</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- LINK MODAL -->
<div class="lmbg" id="lm-bg">
  <div class="lmbox">
    <div id="lm-title" style="font-size:18px;font-weight:700;color:#f8fafc;margin-bottom:18px;"></div>
    <div class="fg"><label class="fl">Display Name</label><input type="text" class="fc" id="lm-name"/></div>
    <div class="fg" id="lm-url-fg"><label class="fl">URL</label><input type="text" class="fc" id="lm-url" placeholder="https://..."/></div>
    <div class="fg"><label class="fl">Icon / Emoji</label><input type="text" class="fc" id="lm-emoji" placeholder="🔗"/></div>
    <div class="fbtns" style="margin-top:8px;">
      <button class="btn-c" onclick="closeLM()">Cancel</button>
      <button class="btn-s" onclick="saveLM()">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="mbg" id="det-bg">
  <div class="mbox">
    <button class="mclose" onclick="closeDet()">❌</button>
    <div class="m-bar"   id="det-bar"></div>
    <div class="m-title" id="det-title"></div>
    <div class="m-grid"  id="det-meta"></div>
    <div class="m-tags"  id="det-tags"></div>
    <div class="m-nlbl">Notes</div>
    <div class="m-notes" id="det-notes"></div>
    <div class="m-actions" id="det-actions"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="brand">Mark's <r>🔥Firebase</r> <b>Dashboard</b></div>
    <div class="nav-r">
      <a href="https://phl-cao.quickbase.com/nav/app/bu9dn5ktp/action/appoverview?from=myqb"
         target="_blank" rel="noopener" class="nav-a">Quickbase</a>
      <button class="sign-out" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>
  <!-- THEME TOGGLE BAR -->
  <div id="theme-bar">
    <span class="th-lbl">🌙 Dark</span>
    <label class="th-wrap">
      <input type="checkbox" id="theme-chk" onchange="toggleTheme()"/>
      <div class="th-track"></div>
      <div class="th-thumb"></div>
    </label>
    <span class="th-lbl">☀️ Light</span>
  </div>
  <!-- HYPERLINK POPUP (replaces ugly browser prompt) -->
  <div id="link-popup">
    <div style="font-size:12px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.8px;">Insert Hyperlink</div>
    <input type="text" id="lp-url" placeholder="https://..."/>
    <input type="text" id="lp-txt" placeholder="Display text (optional)"/>
    <div class="lp-row">
      <button class="lp-btn btn-c" onclick="closeLinkPopup()">Cancel</button>
      <button class="lp-btn btn-s" onclick="insertLink()">Insert</button>
    </div>
  </div>
  <div id="clock-bar">
    <div id="dt"></div>
  <div id="dsub"></div>
</div>
  <div id="search-bar">
    <form class="sw" action="https://www.google.com/search" method="GET" target="_blank">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" name="q" class="si" placeholder="Search Google..."/>
    </form>
  </div>
  <div id="grid">
    <!-- LEFT -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div class="ptitle">Quick Links</div>
          <div style="display:flex;gap:6px;">
            <button id="back-btn" onclick="lBack()" style="display:none;padding:4px 10px;border-radius:6px;background:#2d3748;border:none;color:#94a3b8;font-size:12px;cursor:pointer;">↩️Back</button>
            <button id="edit-btn" onclick="toggleEM()" style="padding:4px 10px;border-radius:6px;background:#2d3748;border:none;color:#94a3b8;font-size:12px;cursor:pointer;">✏️Edit</button>
          </div>
        </div>
        <div id="em-bar" style="display:none;margin-bottom:8px;">
          <div style="display:flex;gap:6px;">
            <button class="sm-btn" style="background:#1d4ed8;color:#fff;" onclick="openLM('link')">New 🔗</button>
            <button class="sm-btn" style="background:#72712d;color:#fff;" onclick="openLM('folder')">New 📁</button>
          </div>
        </div>
        <ul id="link-list"></ul>
      </div>
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <button onclick="calNav(-1)" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;line-height:1;padding:0 6px;">⬅️</button>
          <div class="ptitle" id="cal-lbl"></div>
          <button onclick="calNav(1)"  style="background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;line-height:1;padding:0 6px;">➡️</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;text-align:center;">
          <div style="font-size:10px;font-weight:700;color:#f59e0b;">Sun</div>
          <div style="font-size:10px;color:#a8b1bd;">Mon</div>
          <div style="font-size:10px;color:#a8b1bd;">Tue</div>
          <div style="font-size:10px;color:#a8b1bd;">Wed</div>
          <div style="font-size:10px;color:#a8b1bd;">Thu</div>
          <div style="font-size:10px;color:#a8b1bd;">Fri</div>
          <div style="font-size:10px;font-weight:700;color:#f59e0b;">Sat</div>
        </div>
        <div id="cal-grid"></div>
        <div id="cal-sel" style="text-align:center;font-size:11px;color:#475569;min-height:14px;margin-top:6px;"></div>
      </div>
    </div>
    <!-- CENTER -->
    <div class="panel" style="display:flex;flex-direction:column;gap:14px;min-height:700px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:20px;font-weight:700;color:#f8fafc;">To-Do's</div>
          <div id="todo-count" style="font-size:12px;color:#2978e6;margin-top:2px;"></div>
        </div>
        <button class="btn-s" id="add-btn" onclick="showForm()" style="padding:9px 18px;font-size:13px;">📩 New Item</button>
      </div>
      <div id="form-wrap" style="display:none;"></div>
      <div class="fbar">
        <input type="text" class="fi" id="s-search" placeholder="Search anything..." oninput="applyF()"/>
        <select class="fs" id="s-pri" onchange="applyF()">
          <option value="">All Priorities</option>
          <option>Top</option><option>High</option><option>Medium</option>
          <option>Low</option><option>Future State</option>
        </select>
        <select class="fs" id="s-status" onchange="applyF()">
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="all">All</option>
        </select>

const HASH = "0d619ce5a39ed776feb6a0dcaa02a7af3f852b37e15dd8afdd61081fc91f89b0";

async function sha256(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function tryAuth(){
  const h = await sha256(document.getElementById("auth-in").value.trim());

═══════════════════ */
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DN=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let calDate=new Date(), calSel=null;

window.calNav = d => { calDate=new Date(calDate.getFullYear(),calDate.getMonth()+d,1); buildCal(); };

function buildCal(){
  const yr=calDate.getFullYear(), mo=calDate.getMonth();
  document.getElementById("cal-lbl").textContent = MN[mo]+" "+yr;
  const g=document.getElementById("cal-grid"); g.innerHTML="";
  const first=new Date(yr,mo,1).getDay();
  const dim  =new Date(yr,mo+1,0).getDate();
  const prev =new Date(yr,mo,0).getDate();
  const tod  =new Date(); tod.setHours(0,0,0,0);
  for(let i=first-1;i>=0;i--) addCD(g,prev-i,mo-1,yr,false,tod);
  for(let d=1;d<=dim;d++)     addCD(g,d,mo,yr,true,tod);
  const rem=(first+dim)%7===0?0:7-(first+dim)%7;
  for(let d=1;d<=rem;d++)     addCD(g,d,mo+1,yr,false,tod);
}

function addCD(g,d,mo,yr,inM,tod){
  const obj=new Date(yr,mo,d); obj.setHours(0,0,0,0);
  const dow=obj.getDay();
  const isT=obj.getTime()===tod.getTime();
  const isS=calSel&&obj.getTime()===calSel.getTime();
  let cls="cd";
  if(inM) cls+=" inm";
  if((dow===0||dow===6)&&!isT&&!isS) cls+=" wknd";
  if(isT) cls+=" tdy";
  if(isS) cls+=" sel";
  const div=document.createElement("div");
  div.className=cls; div.textContent=obj.getDate();
  div.title=DN[obj.getDay()]+", "+MN[obj.getMonth()]+" "+obj.getDate()+", "+obj.getFullYear();
  div.onclick=()=>{ calSel=obj; document.getElementById("cal-sel").textContent=div.title; buildCal(); };
  g.appendChild(div);
}

function cleanTag(s){ return s.toLowerCase().replace(/\s+/g,""); }
function parseTags(s){
  return s.split(/[,\s]+/).map(x=>cleanTag(x.replace(/^#/,""))).filter(x=>x.length>0);
}

function allTags(){
  const s=new Set();
  todos.forEach(t=>(t.tags||[]).forEach(tag=>s.add(tag)));
  return [...s].sort();
}

function drawTagCloud(){
  const w=document.getElementById("tag-cloud"); w.innerHTML="";
  allTags().forEach(tag=>{
    const p=document.createElement("div");
    p.className="tp"+(activeTag===tag?" on":"");
    p.textContent="#"+tag;
    p.onclick=()=>{activeTag=activeTag===tag?null:tag; drawTagCloud(); applyF();};
    w.appendChild(p);
  });
}

function fmtDue(s){
  if(!s)return "";
  const [yr,mo,dy]=s.split("-");
  return parseInt(mo,10)+"/"+parseInt(dy,10)+"/"+String(parseInt(yr,10)).slice(-2);
}

function applyF(){
  const srch=(document.getElementById("s-search")||{value:""}).value.toLowerCase();
  const pri =(document.getElementById("s-pri")||{value:""}).value;
  const stat=(document.getElementById("s-status")||{value:"active"}).value;
  const sort=(document.getElementById("s-sort")||{value:"created"}).value;
  let filtered=todos.filter(t=>{
    if(stat==="active"    &&  t.completed) return false;
    if(stat==="completed" && !t.completed) return false;
    if(pri && t.priority!==pri) return false;
    if(activeTag && !(t.tags||[]).includes(activeTag)) return false;
    if(srch){
      const hay=[(t.title||""),(t.notes||""),...(t.tags||[])].join(" ").toLowerCase();
      if(!hay.includes(srch)) return false;
    }
    return true;
  });
  const active=todos.filter(t=>!t.completed).length;
  document.getElementById("todo-count").textContent=active+" active · "+todos.length+" total";

  /* Sort */
  if(sort==="due-asc"){
    filtered.sort((a,b)=>{
      if(!a.dueDate && !b.dueDate) return 0;
      if(!a.dueDate) return 1;
      if(!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    });
  } else if(sort==="due-desc"){
    filtered.sort((a,b)=>{
      if(!a.dueDate && !b.dueDate) return 0;
      if(!a.dueDate) return 1;
      if(!b.dueDate) return -1;
      return b.dueDate.localeCompare(a.dueDate);
    });
  }
  /* "created" keeps default Firestore desc order */
  const list=document.getElementById("todo-list"); list.innerHTML="";
  if(!filtered.length){ list.innerHTML='<div class="empty">📋<br>No items match your filters</div>'; return; }
  filtered.forEach(t=>list.appendChild(makeCard(t)));
}
window.applyF = applyF;

function pk(p){return {Top:"Top",High:"High",Medium:"Medium",Low:"Low","Future State":"Future"}[p]||"";}
function priColor(p){return {Top:"#ef4444",High:"#f97316",Medium:"#eab308",Low:"#22c55e","Future State":"#a855f7"}[p]||"#334155";}

function makeCard(t){
  const k   =pk(t.priority);
  const tags=(t.tags||[]).map(tag=>'<span class="ttag">#'+xss(tag)+'</span>').join("");
  const div =document.createElement("div");
  div.className="tc"+(k?" p-"+k:"")+(t.completed?" done":"");
  div.innerHTML=
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">'
      +'<div class="tc-title">'+xss(t.title||"(no title)")+'</div>'
      +(k?'<span class="badge b-'+k+'">'+xss(t.priority)+'</span>':"")
    +'</div>'
    +(tags?'<div class="tc-tags">'+tags+'</div>':"")
    +(t.dueDate?'<div class="tc-due">Due '+fmtDue(t.dueDate)+'</div>':"")
    +'<div class="tc-hint">Tap to open</div>';
  div.onclick=()=>openDet(t.id);
  return div;
}

      +'<select class="fc" id="f-pri">'+priOpts+'</select></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px;"><label class="fl">Due Date</label>'
      +'<input type="date" class="fc" id="f-due" value="'+(t.dueDate||"")+'"/></div>'
      +'<div style="display:flex;flex-direction:column;gap:5px;"><label class="fl">Reminder</label>'
      +'<input type="date" class="fc" id="f-remind" value="'+(t.reminderDate||"")+'"/></div>'
    +'</div>'
    +'<div class="fg"><label class="fl">Tags — e.g. #work #urgent (auto-lowercased, no spaces)</label>'
    +'<input type="text" class="fc" id="f-tags" placeholder="#tag1 #tag2" value="'+(t.tags||[]).map(x=>"#"+x).join(" ")+'"/></div>'
    +'<div class="fg"><label class="fl">Notes</label>'
    +'<div class="rich-toolbar">'
      +'<button type="button" class="rt-btn" onclick="richCmd(\'bold\')"><b>B</b></button>'
      +'<button type="button" class="rt-btn" onclick="richCmd(\'italic\')"><i>I</i></button>'
      +'<button type="button" class="rt-btn" onclick="richCmd(\'underline\')"><u>U</u></button>'
      +'<button type="button" class="rt-btn" onclick="richCmd(\'insertUnorderedList\')">Bullet List</button>'
      +'<button type="button" class="rt-btn" onclick="richCmd(\'insertOrderedList\')">Ordered List</button>'
      +'<button type="button" class="rt-btn" onclick="addLink()">🔗</button>'
      +'<button type="button" class="rt-btn" onclick="richCmd(\'removeFormat\')">Clear Format</button>'
    +'</div>'
    +'<div class="rich-ed" id="f-notes-ed" contenteditable="true">'+notesContent+'</div></div>'
    +'<div class="fbtns">'
    +'<button class="btn-c" onclick="cancelForm()">Cancel</button>'
    +'<button class="btn-s" id="f-save" onclick="saveForm()">💾Save Item</button>'
    +'</div></div>';
  document.getElementById("add-btn").style.display="none";
  setTimeout(()=>{ const el=document.getElementById("f-title"); if(el)el.focus(); },50);
}

window.cancelForm = ()=>{
  const w=document.getElementById("form-wrap");
  w.style.display="none"; w.innerHTML="";
  document.getElementById("add-btn").style.display="block";
  editingTodo=null;
};

window.saveForm = async()=>{
  const title  =document.getElementById("f-title").value.trim();
  const pri    =document.getElementById("f-pri").value;
  const due    =document.getElementById("f-due").value;
  const remind =document.getElementById("f-remind").value;
  const tags   =parseTags(document.getElementById("f-tags").value);
  const ed     =document.getElementById("f-notes-ed");
  const notesHtml=ed.innerHTML.trim();
  const notes    =ed.innerText.trim();
  if(!title){alert("Title is required.");return;}
  const saveBtn=document.getElementById("f-save");
  saveBtn.textContent="Saving…"; saveBtn.disabled=true;
  const payload={title,priority:pri||"",dueDate:due,reminderDate:remind,notes,notesHtml,tags};
  try{
    if(editingTodo){
      await dbUpdateTodo(editingTodo.id, payload);
    } else {
      await dbAddTodo({...payload, completed:false});
    }
    cancelForm(); await loadTodos();
  } catch(err){
    console.error("saveForm error:",err);
    alert("Error saving to Firebase:\n"+err.message);
    saveBtn.textContent="Save Item"; saveBtn.disabled=false;
  }
};

/* ══════════════════════════════════════
   HELPERS
═══════════════════════════════ */
function fmtTs(ts){
  if(!ts)return "—";
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString("en-US",{month:"numeric",day:"numeric",year:"2-digit"});
}
function xss(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

   ENTRY POINT — runs after all imports
   resolve (module guarantee)
══════════════════════════════════════ */
if(localStorage.getItem("mk_auth")==="1"){
  boot();
}
</script>
